<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing address</title>
    <link rel="stylesheet" href="./payment.css">
</head>
<body>
    <div class="section1">
        <div class="logo">
            <h1>A-HA SHOP</h1>
        </div>
        <div class="section2">
            <h2>Billing Details</h2>
            <p>Please ensure delivery address and phone number is correct for</p>
            <p>adequate delivery rates. Also remove all emojis from your information</p>
        
            <div class="form">
                 <div class="form-group">
                     <label for="email">Email address(Please make sure u have a valid e-mail for checkout)
                        <br>
                        <input type="email">
                        </label>
                </div>
                <div class="form-group">
                    <label for="">First Name
                        <br>
                        <input type="text">
                        </label>
                </div>
                <div class="form-group">
                    <label for="">Last Name
                        <br>
                        <input type="text">
                    </label>
                </div>
                <div class="form-group">
                    <label for="">Phone
                        <br>
                        <input type="number">
                   </label>
                    </div>
                <div class="form-group">
                    <label for="">Country/Region
                        <br>
                        <input type="text">
                     </label>
                </div>
                <div class="form-group">
                    <label for="">State
                        <br>
                        <input type="text">
                    </label>
                    </div>
                <div class="form-group">
                    <label for="">LGA/City
                        <br>
                        <input type="text">
                    </label>
                </div>
            </div>  
            <div class="pay">
                <button>PAY NOW</button>
            </div>    
        </div>
    </div>      
</body>
</html>
