<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <header class="bg-green-600 text-white p-5 mb-6">
        <h1 id="main-title" class="text-3xl font-bold">To-Do List</h1>
    </header>

    <div class="container mx-auto max-w-xl">

        <!-- Add Task Section -->
        <div class="bg-white p-4 rounded shadow mb-6">
            <h2 id="add-title" class="text-xl font-semibold mb-3">Add Task</h2>
            <div class="flex gap-2">
                <input type="text" id="task-input" class="border p-2 w-full rounded" placeholder="Enter a task...">
                <button id="add-btn" class="bg-gray-800 text-white px-4 py-2 rounded">Add</button>
            </div>
        </div>

        <!-- Task List Section -->
        <h2 id="task-title" class="text-xl font-semibold mb-3">Tasks</h2>
        <ul id="task-list" class="space-y-2">

            <!-- Task Item -->
            <li id="task-1" class="bg-white p-3 rounded shadow flex justify-between items-center">
                <span id="task-1-text">Buy groceries</span>
                <div class="flex gap-2">
                    <button id="edit-btn-1" class="bg-yellow-400 text-white px-3 py-1 rounded text-sm">Edit</button>
                    <button id="delete-btn-1" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                </div>
            </li>

            <!-- Task Item -->
            <li id="task-2" class="bg-white p-3 rounded shadow flex justify-between items-center">
                <span id="task-2-text">Read a book</span>
                <div class="flex gap-2">
                    <button id="edit-btn-2" class="bg-yellow-400 text-white px-3 py-1 rounded text-sm">Edit</button>
                    <button id="delete-btn-2" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                </div>
            </li>

        </ul>
    </div>
    <script src="./roast.js"></script>

</body>
