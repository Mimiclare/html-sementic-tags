<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .gen-div {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            background-color: aqua;
        }
        .img-div {
            height: 100%;
            flex: 1;
            background-color: black;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            padding-top: 20px;
            justify-content: center;
            overflow-y: scroll;
        }


        .main-img-div {
            /* background-color: white; */
            height: 200px;
            width: 200px;
            border: white 2px solid;
            border-radius: 10px;
        }

        .main-img-div img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }

        /* search div */
        
        .search-div {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .coll-search {
            width: 550px;
            height: 45px;
            /* background-color: red; */
            border-radius: 10px;
            border: white 2px solid;
            display: flex;
        }

        .coll-search input {
            width: 90%;
            height: 100%;
            border: none;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            background-color: black;
            font-size: 16px;
            color: white;
            padding-left: 10px;
        }

        .search-btn {
            background-color: white;
            height: 100%;
            width: 10%;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .search-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .display-search {
            width: 100%;
            height: 545px;
            margin-top: 20px;
            /* border: dashed 2px black; */
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            overflow-y: scroll;
        }

        .search-img-indi {
            width: 195px;
            height: 195px;
            border: black solid 2px;
            border-radius: 10px;
        }

        .search-img-indi img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            position: relative;
            top: 0;
        }
    </style>
</head>
<body>
    <div class="gen-div">
        <div class="img-div">
            <!-- <div class="main-img-div"></div>
            <div class="main-img-div"></div>
            <div class="main-img-div"></div> -->
        </div>

        <!-- search div -->
        <div class="search-div">
            <div class="coll-search">
                <input type="text" placeholder="Search Any Image" id="input-box">
                <div class="search-btn">
                    <img src="../images/black search icon.png" alt="">
                </div>
            </div>
            <div class="display-search">
                <!-- <div class="search-img-indi"></div>
                <div class="search-img-indi"></div>
                <div class="search-img-indi"></div> -->
            </div>
        </div>
    </div>

    <script src="./promise.js"></script>
</body>
</html>
